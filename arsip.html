<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=3">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arsip — Lina Kariim</title>
  <meta name="description" content="Semua tulisan Lina Kariim tentang seni, sejarah, dan filsafat dalam Bahasa Indonesia.">
  <link rel="canonical" href="https://linakariim.github.io/arsip.html">
  <meta property="og:title" content="Arsip — Lina Kariim">
  <meta property="og:description" content="Semua tulisan Lina Kariim tentang seni, sejarah, dan filsafat dalam Bahasa Indonesia.">
  <meta property="og:url" content="https://linakariim.github.io/arsip.html">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="id_ID">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #FAF7F2;
      --cream-dark: #F0EBE3;
      --gold: #C9A96E;
      --gold-dark: #A8864A;
      --black: #0D0D0D;
      --charcoal: #2A2A2A;
      --gray: #6B6B6B;
      --gray-light: #9A9A9A;
      --border: #E5DDD0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      color: var(--black);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    .nav {
      border-bottom: 1px solid var(--border);
      padding: 0 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 0.8rem; letter-spacing: 0.5px; text-transform: uppercase; color: var(--gray); transition: color 0.2s; }
    .nav-links a:hover { color: var(--gold-dark); }

    .archive-header {
      padding: 64px 64px 40px;
      border-bottom: 1px solid var(--border);
    }
    .archive-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 400;
      color: var(--black);
      margin-bottom: 8px;
    }
    .archive-header p { font-size: 0.9rem; color: var(--gray); }

    .archive-month { padding: 40px 64px 0; }
    .month-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .article-row {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 28px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .article-row:last-child { border-bottom: none; }
    .article-row:hover { background: var(--cream-dark); margin: 0 -24px; padding: 20px 24px; }

    .article-row-thumb {
      aspect-ratio: 16/9;
      overflow: hidden;
      border-radius: 2px;
      background: var(--cream-dark);
    }
    .article-row-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .article-row-content { display: flex; flex-direction: column; justify-content: center; }
    .article-row-tag {
      font-size: 0.62rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 6px;
    }
    .article-row-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--black);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .article-row-meta { font-size: 0.72rem; color: var(--gray-light); }

    footer {
      background: var(--cream-dark);
      border-top: 1px solid var(--border);
      padding: 40px 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 64px;
    }
    footer span { font-size: 0.75rem; color: var(--gray-light); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { font-size: 0.75rem; color: var(--gray-light); transition: color 0.2s; }
    .footer-links a:hover { color: var(--gold-dark); }

    @media (max-width: 768px) {
      .nav { padding: 0 24px; }
      .nav-links { display: none; }
      .archive-header { padding: 48px 24px 32px; }
      .archive-month { padding: 32px 24px 0; }
      .article-row { grid-template-columns: 1fr; gap: 12px; }
      .article-row-thumb { aspect-ratio: 16/9; }
      footer { flex-direction: column; gap: 16px; text-align: center; padding: 32px 24px; }
    }
  </style>

  <script>
    async function loadArchive() {
      try {
        const resp = await fetch('articles.json');
        const articles = await resp.json();

        // Group by month
        const byMonth = {};
        articles.forEach(a => {
          const d = new Date(a.date + 'T00:00:00');
          const key = d.toLocaleDateString('id-ID', { year: 'numeric', month: 'long' });
          if (!byMonth[key]) byMonth[key] = [];
          byMonth[key].push(a);
        });

        const container = document.getElementById('archive-list');
        const months = Object.keys(byMonth).sort((a, b) => new Date(b) - new Date(a));

        months.forEach(month => {
          const section = document.createElement('div');
          section.className = 'archive-month';

          const label = document.createElement('div');
          label.className = 'month-label';
          label.textContent = month;
          section.appendChild(label);

          byMonth[month].forEach(a => {
            const row = document.createElement('div');
            row.className = 'article-row';
            row.onclick = () => location.href = a.slug + '.html';
            row.innerHTML = `
              <div class="article-row-thumb">
                <img src="${a.cover}" alt="${a.coverAlt || a.title}" loading="lazy">
              </div>
              <div class="article-row-content">
                <span class="article-row-tag">${a.category}</span>
                <h3 class="article-row-title">${a.title}</h3>
                <p class="article-row-meta">${a.dateDisplay} · ${a.readTime} min baca</p>
              </div>
            `;
            section.appendChild(row);
          });

          container.appendChild(section);
        });

        document.getElementById('article-count').textContent = articles.length;
      } catch(e) {
        console.error('Failed to load archive:', e);
      }
    }
    document.addEventListener('DOMContentLoaded', loadArchive);
  </script>

  <!-- Google Analytics 4 -->

</head>
