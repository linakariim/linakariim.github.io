  <style>
    :root {
      --cream: #FAF7F2;
      --cream-dark: #F0EBE3;
      --gold: #C9A96E;
      --gold-dark: #A8864A;
      --gold-light: #EDD9A3;
      --black: #0D0D0D;
      --charcoal: #2A2A2A;
      --gray: #6B6B6B;
      --gray-light: #9A9A9A;
      --border: #E5DDD0;
      --white: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    .nav {
      border-bottom: 1px solid var(--border);
      padding: 0 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--black);
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--gray);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold-dark); }

    .featured { padding: 56px 64px 64px; }
    .featured-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 28px;
    }

    .featured-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      max-width: 1200px;
      margin: 0 auto;
      align-items: center;
    }

    .featured-main-img {
      aspect-ratio: 16/9;
      overflow: hidden;
      border-radius: 2px;
      background: var(--cream-dark);
    }
    .featured-main-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .featured-main-content { padding: 0 0 0 8px; }
    .featured-article-tag {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 16px;
    }
    .featured-main h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.2;
      color: var(--black);
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }
    .featured-main p {
      font-size: 0.95rem;
      color: var(--gray);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .featured-main .read-more {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gold-dark);
      border-bottom: 1px solid var(--gold-light);
      padding-bottom: 2px;
      transition: all 0.2s;
    }
    .featured-main .read-more:hover {
      color: var(--gold-dark);
      border-color: var(--gold-dark);
    }

    .articles-section { padding: 0 64px 64px; max-width: 1200px; margin: 0 auto; }
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--black);
    }
    .section-link {
      font-size: 0.75rem;
      color: var(--gray-light);
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .section-link:hover { color: var(--gold-dark); }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .article-card {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .article-card-img {
      aspect-ratio: 16/9;
      overflow: hidden;
      border-radius: 2px;
      background: var(--cream-dark);
      margin-bottom: 16px;
    }
    .article-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .article-card:hover .article-card-img img { transform: scale(1.03); }
    .article-card-tag {
      font-size: 0.62rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 8px;
    }
    .article-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--black);
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .article-card-meta {
      font-size: 0.72rem;
      color: var(--gray-light);
    }

    .newsletter {
      background: var(--cream-dark);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 56px 64px;
      text-align: center;
    }
    .newsletter h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--black);
      margin-bottom: 8px;
    }
    .newsletter p {
      font-size: 0.9rem;
      color: var(--gray);
      margin-bottom: 28px;
    }
    .newsletter-form {
      display: flex;
      gap: 0;
      max-width: 480px;
      margin: 0 auto;
    }
    .newsletter-form input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-right: none;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      border-radius: 2px 0 0 2px;
    }
    .newsletter-form input::placeholder { color: var(--gray-light); }
    .newsletter-form button {
      padding: 12px 24px;
      background: var(--gold);
      color: var(--white);
      border: 1px solid var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-radius: 0 2px 2px 0;
      transition: background 0.2s;
    }
    .newsletter-form button:hover { background: var(--gold-dark); border-color: var(--gold-dark); }

    footer {
      background: var(--cream-dark);
      border-top: 1px solid var(--border);
      padding: 40px 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer span { font-size: 0.75rem; color: var(--gray-light); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a {
      font-size: 0.75rem;
      color: var(--gray-light);
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--gold-dark); }

    @media (max-width: 768px) {
      .nav { padding: 0 24px; }
      .nav-links { display: none; }
      .featured { padding: 40px 24px 48px; }
      .featured-main { grid-template-columns: 1fr; gap: 24px; }
      .featured-main h2 { font-size: 1.6rem; }
      .articles-section { padding: 0 24px 48px; }
      .articles-grid { grid-template-columns: 1fr; gap: 24px; }
      .newsletter { padding: 40px 24px; }
      .newsletter-form { flex-direction: column; }
      .newsletter-form input { border-right: 1px solid var(--border); border-radius: 2px; }
      .newsletter-form button { border-radius: 2px; }
      footer { flex-direction: column; gap: 16px; text-align: center; padding: 32px 24px; }
    }
  </style>

  <script>
    // Load articles from JSON — single source of truth for all article cards
    async function loadArticles() {
      try {
        const resp = await fetch('articles.json');
        const articles = await resp.json();

        // Featured main: first article
        const featured = articles[0];
        const featuredEl = document.getElementById('featured-main');
        if (featuredEl) {
          featuredEl.href = featured.slug + '.html';
          featuredEl.querySelector('.featured-main-img img').src = featured.cover;
          featuredEl.querySelector('.featured-main-img img').alt = featured.coverAlt || featured.title;
          const tag = featuredEl.querySelector('.featured-article-tag');
          if (tag) tag.textContent = featured.category;
          const h2 = featuredEl.querySelector('h2');
          if (h2) h2.textContent = featured.title;
          const p = featuredEl.querySelector('.featured-main p');
          if (p) p.textContent = featured.description;
        }

        // Artikel Terbaru grid: next 6 articles
        const grid = document.getElementById('articles-grid');
        if (grid) {
          grid.innerHTML = '';
          const gridArticles = articles.slice(1, 7); // index 1-6
          gridArticles.forEach(a => {
            const card = document.createElement('a');
            card.className = 'article-card';
            card.href = a.slug + '.html';
            card.innerHTML = `
              <div class="article-card-img">
                <img src="${a.cover}" alt="${a.coverAlt || a.title}" loading="lazy">
              </div>
              <span class="article-card-tag">${a.category}</span>
              <h3>${a.title}</h3>
              <p class="article-card-meta">${a.dateDisplay} · ${a.readTime} min baca</p>
            `;
            grid.appendChild(card);
          });
        }
      } catch(e) {
        console.error('Failed to load articles:', e);
      }
    }
    document.addEventListener('DOMContentLoaded', loadArticles);
  </script>
