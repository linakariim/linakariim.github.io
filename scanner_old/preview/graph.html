<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Graph Preview — 2026 Mei W2</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #faf9f7; }
    .header { padding: 20px 28px 12px; border-bottom: 1px solid #e8e4dc; }
    .header h1 { font-size: 15px; font-weight: 700; color: #1c1917; }
    .header p { font-size: 12px; color: #78716c; margin-top: 2px; }
    #graph { width: 100%; height: calc(100vh - 80px); }
    .node { cursor: pointer; }
    .node-label { font-size: 11px; font-weight: 600; fill: #44403c; pointer-events: none; }
    .node-sub { font-size: 10px; fill: #a8a29e; pointer-events: none; }
    .link { stroke: #d6d3cd; stroke-linecap: round; }
    .link-label { font-size: 9px; fill: #a8a29e; }
  </style>
</head>
<body>
<div class="header">
  <h1>Topic Co-Occurrence Graph — Mei 2026 Minggu ke-2</h1>
  <p>Nodes = Issue Groups · Size = article count · Colors = signal type (blue=response, red=pressure, gray=neutral)</p>
</div>
<svg id="graph"></svg>
<script>
const COLOR = { response: '#3b82f6', pressure: '#ef4444', neutral: '#94a3b8' };

fetch('./graph-data.json')
  .then(r => r.json())
  .then(({ nodes, links }) => {
    const svg = d3.select('#graph');
    const w = svg.node().clientWidth;
    const h = svg.node().clientHeight;

    svg.append('g').attr('class', 'links');
    svg.append('g').attr('class', 'nodes');
    svg.append('g').attr('class', 'labels');

    const sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(80).strength(0.4))
      .force('charge', d3.forceManyBody().strength(-200))
      .force('center', d3.forceCenter(w / 2, h / 2))
      .force('collide', d3.forceCollide().radius(d => Math.sqrt(d.count) * 4 + 20));

    const linkEl = svg.select('.links').selectAll('line')
      .data(links).join('line')
      .attr('class', 'link')
      .attr('stroke-width', d => Math.sqrt(d.width));

    const nodeGroup = svg.select('.nodes').selectAll('.node')
      .data(nodes).join('g').attr('class', 'node');

    nodeGroup.append('circle')
      .attr('r', d => Math.sqrt(d.count) * 4 + 8)
      .attr('fill', d => d.color)
      .attr('fill-opacity', 0.85)
      .attr('stroke', '#fff')
      .attr('stroke-width', 2);

    const label = svg.select('.labels').selectAll('text')
      .data(nodes).join('text')
      .attr('class', 'node-label')
      .attr('text-anchor', 'middle')
      .attr('dy', -4)
      .text(d => d.label);

    const subLabel = svg.select('.labels').selectAll('.sub')
      .data(nodes).join('text')
      .attr('class', 'node-sub')
      .attr('text-anchor', 'middle')
      .attr('dy', 8)
      .text(d => d.sub);

    sim.on('tick', () => {
      linkEl
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
      label.attr('x', d => d.x).attr('y', d => d.y);
      subLabel.attr('x', d => d.x).attr('y', d => d.y);
    });

    nodeGroup.on('mouseover', function(event, d) {
      d3.select(this).select('circle').attr('fill-opacity', 1);
    }).on('mouseout', function(event, d) {
      d3.select(this).select('circle').attr('fill-opacity', 0.85);
    });
  });
</script>
</body>
</html>
