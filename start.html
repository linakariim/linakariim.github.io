<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lina's Corner</title>
  <link rel="canonical" href="https://linakariima.github.io/start.html">
  <meta property="og:title" content="Lina's Corner">
  <meta property="og:description" content="Semua sudut Lina Kariim di satu tempat.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf7f2;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 50px 20px;
      color: #1a1a1a;
    }

    .page {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
      border: 2px solid #d4c9b8;
    }

    .corner-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a08060;
      background: #f0ebe0;
      border: 1px solid #d4c9b8;
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 4px;
    }

    .name {
      display: none;
    }

    /* --- Topic Sections --- */
    .section {
      margin-top: 28px;
      text-align: left;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #a08060;
      margin-bottom: 10px;
    }

    /* --- Buttons --- */
    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      background: #fff;
      border: 1px solid #ddd5c5;
      border-radius: 10px;
      text-decoration: none;
      color: #5a4a30;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s ease;
      margin-bottom: 8px;
    }

    .btn:hover {
      background: #f5f0e8;
      border-color: #c8bda8;
    }

    .btn .btn-icon {
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .btn .btn-main {
      flex: 1;
      text-align: left;
    }

    .btn .btn-sub {
      display: block;
      font-size: 0.72rem;
      color: #8a7a60;
      font-weight: 400;
      margin-top: 1px;
    }

    .btn .btn-arrow {
      font-size: 0.8rem;
      color: #b0a080;
      flex-shrink: 0;
    }

    /* Sub-stack button */
    .btn.substack-btn {
      background: #f5f0e8;
      border-color: #d4c9b8;
      color: #6a5a40;
    }
    .btn.substack-btn:hover { background: #ede6d8; border-color: #c0b498; }
    .btn.substack-btn .btn-sub { color: #8a7a60; }
    .btn.substack-btn .btn-arrow { color: #a09070; }

    /* Reading Ramble button */
    .btn.serat-btn {
      background: #f5f0e8;
      border-color: #d4c9b8;
      color: #6a5a40;
    }
    .btn.serat-btn:hover { background: #ede6d8; border-color: #c0b498; }
    .btn.serat-btn .btn-sub { color: #8a7a60; }
    .btn.serat-btn .btn-arrow { color: #a09070; }

    /* Social platform mini-btns inside a section */
    .platforms-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .platform-btn {
      flex: 1;
      min-width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 10px 8px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.15s ease;
      background: #f5f0e8;
      color: #6a5a40;
      border: 1px solid #d4c9b8;
    }

    .platform-btn:hover { background: #ede6d8; border-color: #c0b498; }

    .platform-btn .p-name { font-size: 0.72rem; font-weight: 600; }
    .platform-btn .p-desc { font-size: 0.65rem; font-weight: 400; opacity: 0.75; }

    /* --- Dividers --- */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, #d4c9b8, transparent);
      margin: 24px 0;
    }

    .landing-link {
      display: block;
      font-size: 0.78rem;
      color: #a09070;
      text-decoration: none;
      padding: 10px;
      border: 1px dashed #d4c9b8;
      border-radius: 8px;
      transition: all 0.15s ease;
    }
    .landing-link:hover { background: #f5f0e8; color: #8a7050; }
  </style>
</head>
<body>

  <div class="page">
    <img
      src="https://linakariima.github.io/images/profil.jpg"
      alt="Lina Kariim"
      class="avatar"
      onerror="this.style.display='none'"
    >

    <div class="corner-badge">Lina's Corner</div>
    <h1 class="name">Lina Kariim</h1>

    <!-- Newsletter -->
    <div class="section">
      <a href="https://catatanalin.substack.com" target="_blank" class="btn substack-btn">
        <span class="btn-icon">✉</span>
        <span class="btn-main">
          Newsletter
          <span class="btn-sub">Benang Merah — weekly</span>
        </span>
        <span class="btn-arrow">→</span>
      </a>
    </div>

    <div class="divider"></div>

    <!-- Arts & History -->
    <div class="section">
      <div class="section-label">Linakariima — Arts & History</div>
      <div class="platforms-row">
        <a href="https://www.youtube.com/@linakariima" target="_blank" class="platform-btn youtube">
          <span class="p-name">YouTube</span>
          <span class="p-desc">Video esai</span>
        </a>
        <a href="https://www.instagram.com/linakariima" target="_blank" class="platform-btn instagram">
          <span class="p-name">Instagram</span>
          <span class="p-desc">Arts & History</span>
        </a>
        <a href="https://www.tiktok.com/@linakariima" target="_blank" class="platform-btn tiktok">
          <span class="p-name">TikTok</span>
          <span class="p-desc">Shorts & reels</span>
        </a>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Reading Ramble -->
    <div class="section">
      <div class="section-label">Reading Ramble</div>
      <a href="https://www.instagram.com/serat.kalbu" target="_blank" class="btn serat-btn">
        <span class="btn-icon">✦</span>
        <span class="btn-main">
          @serat.kalbu
          <span class="btn-sub">Instagram — bacaan & obrolan</span>
        </span>
        <span class="btn-arrow">→</span>
      </a>
    </div>

    <div class="divider"></div>

    <a href="https://linakariima.github.io" class="landing-link">
      ☕ Landing page — pelajari lebih lanjut
    </a>

  </div>

</body>
</html>
